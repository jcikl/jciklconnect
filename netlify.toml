[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Required env vars (set in Netlify dashboard, not here):
#   VITE_FIREBASE_API_KEY, VITE_FIREBASE_AUTH_DOMAIN, VITE_FIREBASE_PROJECT_ID
#   VITE_FIREBASE_STORAGE_BUCKET, VITE_FIREBASE_MESSAGING_SENDER_ID, VITE_FIREBASE_APP_ID
#   VITE_FIREBASE_VAPID_KEY, VITE_CLOUDINARY_CLOUD_NAME, VITE_CLOUDINARY_UPLOAD_PRESET
#   VITE_CLOUDINARY_MEMBER_AVATAR_ASSET_ROOT, VITE_WHAPI_TOKEN, VITE_WHAPI_ADMIN_PHONE
#   FIREBASE_ADMIN_PROJECT_ID, FIREBASE_ADMIN_CLIENT_EMAIL, FIREBASE_ADMIN_PRIVATE_KEY
#   CLOUDINARY_CLOUD_NAME, CLOUDINARY_API_KEY, CLOUDINARY_API_SECRET
#   TOYYIBPAY_SECRET_KEY, TOYYIBPAY_SANDBOX, TOYYIBPAY_WEBHOOK_SECRET, TOYYIBPAY_CALLBACK_URL
#   CRON_SECRET

[dev]
  command = "npm run dev"
  targetPort = 3000
  framework = "#custom"

[functions]
  node_bundler = "esbuild"

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[[redirects]]
  from = "/api/webhooks/toyyibpay"
  to = "/.netlify/functions/toyyibpay-callback"
  status = 200
  force = true

[[redirects]]
  from = "/api/toyyibpay"
  to = "/.netlify/functions/toyyibpay-api"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' blob: https://www.gstatic.com https://apis.google.com https://www.googletagmanager.com https://www.google.com/recaptcha/ https://recaptcha.net/recaptcha/ https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://res.cloudinary.com https://lh3.googleusercontent.com https://firebasestorage.googleapis.com https://ui-avatars.com https://gravatar.com https://jcimalaysia.cc; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com wss://*.firebaseio.com https://lh3.googleusercontent.com https://www.google.com/recaptcha/ https://recaptcha.net/ https://api.cloudinary.com https://res.cloudinary.com https://jcimalaysia.cc; frame-src 'self' https://drive.google.com https://docs.google.com https://*.firebaseapp.com https://apis.google.com https://www.google.com/recaptcha/ https://recaptcha.net/; worker-src 'self' blob:; frame-ancestors 'self'; upgrade-insecure-requests;"

[[headers]]
  for = "/firebase-messaging-sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
