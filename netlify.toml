[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# ---------------------------------------------------------------------------
# CFG-005: Document required VITE_ env vars so the environment can be
# reproduced from this file alone. Actual values are set in the Netlify
# dashboard — placeholders here are documentation only.
# ---------------------------------------------------------------------------
[context.production.environment]
  VITE_FIREBASE_API_KEY           = "REPLACE_IN_DASHBOARD"
  VITE_FIREBASE_AUTH_DOMAIN       = "REPLACE_IN_DASHBOARD"
  VITE_FIREBASE_PROJECT_ID        = "REPLACE_IN_DASHBOARD"
  VITE_FIREBASE_STORAGE_BUCKET    = "REPLACE_IN_DASHBOARD"
  VITE_FIREBASE_MESSAGING_SENDER_ID = "REPLACE_IN_DASHBOARD"
  VITE_FIREBASE_APP_ID            = "REPLACE_IN_DASHBOARD"
  VITE_FIREBASE_VAPID_KEY         = "REPLACE_IN_DASHBOARD"
  VITE_RECAPTCHA_SITE_KEY         = "REPLACE_IN_DASHBOARD"
  VITE_CLOUDINARY_CLOUD_NAME      = "REPLACE_IN_DASHBOARD"
  VITE_CLOUDINARY_UPLOAD_PRESET   = "REPLACE_IN_DASHBOARD"
  VITE_CLOUDINARY_MEMBER_AVATAR_ASSET_ROOT = "REPLACE_IN_DASHBOARD"
  VITE_WHAPI_TOKEN                = "REPLACE_IN_DASHBOARD"
  VITE_WHAPI_ADMIN_PHONE          = "REPLACE_IN_DASHBOARD"
# Server-side secrets (also set in Netlify dashboard, never in .env):
#   FIREBASE_ADMIN_PROJECT_ID, FIREBASE_ADMIN_CLIENT_EMAIL, FIREBASE_ADMIN_PRIVATE_KEY
#   CLOUDINARY_CLOUD_NAME, CLOUDINARY_API_KEY, CLOUDINARY_API_SECRET
#   TOYYIBPAY_SECRET_KEY, TOYYIBPAY_SANDBOX, TOYYIBPAY_WEBHOOK_SECRET, TOYYIBPAY_CALLBACK_URL
#   CRON_SECRET

[dev]
  command = "npm run dev"
  targetPort = 3000
  framework = "#custom"

[functions]
  node_bundler = "esbuild"

# CFG-008: Declare the birthday-notifications scheduled function using Netlify's
# scheduler syntax. [functions."name"] is the correct TOML form — [[functions]]
# conflicts with the [functions] table above.
[functions."birthday-notifications"]
  schedule = "0 0 * * *"

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[[redirects]]
  from = "/api/webhooks/toyyibpay"
  to = "/.netlify/functions/toyyibpay-callback"
  status = 200
  force = true

[[redirects]]
  from = "/api/toyyibpay"
  to = "/.netlify/functions/toyyibpay-api"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking ” disallow embedding in iframes from other origins
    X-Frame-Options = "SAMEORIGIN"
    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"
    # Force HTTPS for 1 year, include subdomains
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Limit referrer info sent to third parties
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Restrict browser features not needed by the app
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    # Content-Security-Policy — Firebase, Google APIs, Cloudinary
    # SEC-004: unsafe-inline retained in script-src (required by Firebase SDK and inline event handlers).
    # TODO SEC-004: Replace unsafe-inline with nonce-based CSP. Requires Netlify Edge Function for per-request nonce injection.
    # SEC-004: unsafe-eval REMOVED — React 19 does not require eval.
    # SEC-005: Removed public CORS proxy domains (corsproxy.io, allorigins.win, codetabs.com) — these should never appear in a production CSP.
    #          If a service was using them, replace with a Netlify Function proxy (see netlify/functions/).
    # SEC-006: img-src restricted to known HTTPS origins only; wildcard https: and http: removed.
    # SEC-007: frame-ancestors 'self' added — prevents clickjacking at the CSP level (complements X-Frame-Options).
    # SEC-008: upgrade-insecure-requests added — browser will upgrade any accidental http:// sub-resource requests to https://.
    Content-Security-Policy = “default-src 'self'; script-src 'self' 'unsafe-inline' blob: https://www.gstatic.com https://apis.google.com https://www.googletagmanager.com https://www.google.com/recaptcha/ https://recaptcha.net/recaptcha/ https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://res.cloudinary.com https://lh3.googleusercontent.com https://firebasestorage.googleapis.com https://ui-avatars.com https://gravatar.com; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com wss://*.firebaseio.com https://lh3.googleusercontent.com https://www.google.com/recaptcha/ https://recaptcha.net/ https://api.cloudinary.com https://res.cloudinary.com https://jcimalaysia.cc; frame-src 'self' https://drive.google.com https://docs.google.com https://*.firebaseapp.com https://apis.google.com https://www.google.com/recaptcha/ https://recaptcha.net/; worker-src 'self' blob:; frame-ancestors 'self'; upgrade-insecure-requests;”

[[headers]]
  for = "/firebase-messaging-sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
